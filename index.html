<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Filius in Browser</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        (async function() {
            // Wacht tot CheerpJ volledig is opgestart
            await cheerpjInit({
                // Forceer het vooraf laden
                preloadArray: [
                    "/lib/batik-anim-1.12.jar",
                    "/lib/batik-awt-util-1.12.jar",
                    "/lib/batik-bridge-1.12.jar",
                    "/lib/batik-codec-1.12.jar",
                    "/lib/batik-constants-1.12.jar",
                    "/lib/batik-css-1.12.jar",
                    "/lib/batik-dom-1.12.jar",
                    "/lib/batik-ext-1.12.jar",
                    "/lib/batik-gvt-1.12.jar",
                    "/lib/batik-i18n-1.12.jar",
                    "/lib/batik-parser-1.12.jar",
                    "/lib/batik-script-1.12.jar",
                    "/lib/batik-svg-dom-1.12.jar",
                    "/lib/batik-svggen-1.12.jar",
                    "/lib/batik-transcoder-1.12.jar",
                    "/lib/batik-util-1.12.jar",
                    "/lib/batik-xml-1.12.jar",
                    "/lib/commons-cli-1.4.jar",
                    "/lib/commons-codec-1.2.jar",
                    "/lib/commons-httpclient-3.1.jar",
                    "/lib/commons-io-2.8.0.jar",
                    "/lib/commons-lang3-3.3.2.jar",
                    "/lib/commons-logging-1.0.4.jar",
                    "/lib/htmlparser-1.6.jar",
                    "/lib/itextpdf-5.5.13.1.jar",
                    "/lib/logback-classic-1.2.3.jar",
                    "/lib/logback-core-1.2.3.jar",
                    "/lib/semantic-version-2.1.0.jar",
                    "/lib/serializer-2.7.2.jar",
                    "/lib/slf4j-api-1.7.30.jar",
                    "/lib/xalan-2.7.2.jar",
                    "/lib/xml-apis-1.4.01.jar",
                    "/lib/xml-apis-ext-1.3.04.jar",
                    "/lib/xmlgraphics-commons-2.4.jar",

                    "filius.jar"
                ]
            });
            
            // Maak het grafische scherm aan
            cheerpjCreateDisplay(window.innerWidth, window.innerHeight, document.getElementById("container"));
            
            // Start Filius
            await cheerpjRunMain("filius.Main", "/app/filius.jar");
        })();
    </script>

</body>
</html>
