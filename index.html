<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Filius in de Browser</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/cj3loader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="container"></div>

    <script>
        // UPDATE: CheerpJ 3.0 vereist een asynchrone start (async/await)
        (async function() {
            // Wacht tot CheerpJ volledig is opgestart
            await cheerpjInit();
            
            // Maak het grafische scherm aan
            cheerpjCreateDisplay(window.innerWidth, window.innerHeight, document.getElementById("container"));
            
            // Start Filius (verwijzend naar jouw jsDelivr of lokale GitHub map)
            await cheerpjRunMain("filius.Main", "app/filius.jar");
        })();
    </script>

</body>
</html>
