<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Filius in de Browser</title>
    <script src="https://cjrtnc.leaningtech.com/3.0/loader.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #f0f0f0; }
        #container { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <div id="container"></div>

    <script>
        // Stap B: Initialiseer CheerpJ
        cheerpjInit().then(function() {
            // Stap C: Maak de grafische display aan binnen onze div
            cheerpjCreateDisplay(window.innerWidth, window.innerHeight, document.getElementById("container"));
            
            // Stap D: Start de Java applicatie
            // Vervang 'filius.jar' als jouw hoofdbestand anders heet.
            // '/app/' verwijst naar de map waar de bestanden op GitHub staan.
            cheerpjRunMain("filius.Main", "/app/filius.jar");
        });
    </script>

</body>
</html>
